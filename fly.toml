app = "queuestorm-ticket-sorter"
primary_region = "sin"          # Singapore — lowest latency to BD

[build]
  # Fly auto-detects Node.js from package.json; Dockerfile also works.
  builder = "dockerfile"

[env]
  NODE_ENV    = "production"
  PORT        = "8080"
  LLM_FALLBACK_ENABLED = "false"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory      = "256mb"
  cpu_kind    = "shared"
  cpus        = 1
